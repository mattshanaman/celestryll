<?xml version="1.0" encoding="UTF-8"?>
<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with pattern -->
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#512BD4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2B0B98;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#512BD4;stop-opacity:1" />
    </linearGradient>

    <!-- Wonky pattern -->
    <pattern id="wonkyPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="40" height="40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.1" transform="rotate(5 20 20)"/>
      <rect x="10" y="10" width="20" height="20" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15" transform="rotate(-7 20 20)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="456" height="456" fill="url(#bgGradient)"/>
  <rect width="456" height="456" fill="url(#wonkyPattern)"/>

  <!-- Badly Defined Text - Each letter rotated and positioned chaotically -->
  <g id="badlyDefinedText">
    <!-- "Badly" -->
    <text x="60" y="180" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#8B4513" transform="rotate(-8 60 180)">B</text>
    <text x="95" y="195" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#9ACD32" transform="rotate(5 95 195)">a</text>
    <text x="125" y="185" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#FFE082" transform="rotate(-3 125 185)">d</text>
    <text x="158" y="178" font-family="Arial, sans-serif" font-size="43" font-weight="bold" fill="#6B4423" transform="rotate(7 158 178)">l</text>
    <text x="180" y="190" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#9ACD32" transform="rotate(-5 180 190)">y</text>

    <!-- "Defined" -->
    <text x="70" y="260" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="#dc3545" transform="rotate(6 70 260)">D</text>
    <text x="115" y="270" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#8B4513" transform="rotate(-7 115 270)">e</text>
    <text x="150" y="255" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#9ACD32" transform="rotate(4 150 255)">f</text>
    <text x="185" y="265" font-family="Arial, sans-serif" font-size="43" font-weight="bold" fill="#FFE082" transform="rotate(-6 185 265)">i</text>
    <text x="210" y="258" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#6B4423" transform="rotate(8 210 258)">n</text>
    <text x="250" y="270" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#9ACD32" transform="rotate(-4 250 270)">e</text>
    <!-- Last 'd' - dangling precariously -->
    <text x="285" y="290" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#FFE082" transform="rotate(18 285 290)">d</text>
  </g>

  <!-- Decorative wonky elements -->
  <g id="decorations" opacity="0.3">
    <!-- Wonky circles -->
    <circle cx="380" cy="100" r="15" fill="none" stroke="#FFE082" stroke-width="3" transform="rotate(15 380 100)"/>
    <circle cx="80" cy="350" r="20" fill="none" stroke="#9ACD32" stroke-width="2" transform="rotate(-12 80 350)"/>
    <circle cx="370" cy="370" r="18" fill="none" stroke="#8B4513" stroke-width="2.5" transform="rotate(8 370 370)"/>

    <!-- Wonky squares -->
    <rect x="345" y="320" width="25" height="25" fill="none" stroke="#FFE082" stroke-width="2" transform="rotate(20 357.5 332.5)"/>
    <rect x="50" y="90" width="30" height="30" fill="none" stroke="#9ACD32" stroke-width="2" transform="rotate(-15 65 105)"/>
  </g>

  <!-- Question marks floating around -->
  <g id="questionMarks" opacity="0.2">
    <text x="350" y="50" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" transform="rotate(15 350 50)">?</text>
    <text x="400" y="200" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" transform="rotate(-12 400 200)">?</text>
    <text x="30" y="120" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#ffffff" transform="rotate(18 30 120)">?</text>
    <text x="40" y="400" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff" transform="rotate(-10 40 400)">?</text>
    <text x="390" y="430" font-family="Arial, sans-serif" font-size="33" font-weight="bold" fill="#ffffff" transform="rotate(22 390 430)">?</text>
  </g>

  <!-- Subtitle -->
  <text x="228" y="310" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#DFD8F7" text-anchor="middle" transform="rotate(-2 228 310)">Word Puzzle Game</text>
</svg>
