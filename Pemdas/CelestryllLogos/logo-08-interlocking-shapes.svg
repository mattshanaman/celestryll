<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(100, 80)">
        <!-- Back rectangle (midnight blue) -->
        <rect x="-35" y="-25" width="45" height="45" rx="8" fill="#0F1A2B" stroke="none"/>
        <!-- Left rectangle (violet) -->
        <rect x="-45" y="-10" width="45" height="45" rx="8" fill="#6A6DFF" stroke="none" opacity="0.9"/>
        <!-- Right rectangle (teal) -->
        <rect x="-10" y="-10" width="45" height="45" rx="8" fill="#1FA2A0" stroke="none" opacity="0.9"/>
        <!-- Central overlap highlights -->
        <circle cx="-17.5" cy="12.5" r="8" fill="#E8F7F6" opacity="0.6"/>
        <circle cx="7.5" cy="12.5" r="8" fill="#E8F7F6" opacity="0.6"/>
        <!-- Connecting dots -->
        <circle cx="-22.5" cy="2.5" r="3" fill="#E8F7F6"/>
        <circle cx="12.5" cy="2.5" r="3" fill="#E8F7F6"/>
        <circle cx="-5" cy="15" r="3" fill="#E8F7F6"/>
    </g>
    <text x="100" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#0F1A2B" letter-spacing="2">Celestryll</text>
</svg>
