<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(100, 80) rotate(-45)">
        <!-- Outer constellation crescent -->
        <path d="M -40,0 A 40,40 0 1,1 40,0 A 33,33 0 1,0 -33,0 Z"
              fill="none" stroke="#0F1A2B" stroke-width="2.5"/>
        <!-- Star constellation forming C-shape on left curve -->
        <circle cx="0" cy="-38" r="3.5" fill="#1FA2A0"/>
        <circle cx="-18" cy="-33" r="3" fill="#6A6DFF"/>
        <circle cx="-28" cy="-28" r="3.5" fill="#1FA2A0"/>
        <circle cx="-35" cy="-20" r="3" fill="#6A6DFF"/>
        <circle cx="-38" cy="-10" r="4" fill="#1FA2A0"/>
        <circle cx="-40" cy="0" r="3.5" fill="#6A6DFF"/>
        <circle cx="-38" cy="10" r="4" fill="#1FA2A0"/>
        <circle cx="-35" cy="20" r="3" fill="#6A6DFF"/>
        <circle cx="-28" cy="28" r="3.5" fill="#1FA2A0"/>
        <circle cx="-18" cy="33" r="3" fill="#6A6DFF"/>
        <circle cx="0" cy="38" r="3.5" fill="#1FA2A0"/>
        <!-- Connection lines -->
        <path d="M 0,-38 L -18,-33 L -28,-28 L -35,-20 L -38,-10 L -40,0 L -38,10 L -35,20 L -28,28 L -18,33 L 0,38"
              fill="none" stroke="#6A6DFF" stroke-width="1" opacity="0.5"/>
        <!-- Orbital ring system centered in open area -->
        <g transform="translate(5, 0) scale(0.5) rotate(45)">
            <g transform="rotate(45)">
                <path d="M -55,0 A 55,20 0 0,1 -20,-18" fill="none" stroke="#2D2F7F" stroke-width="3"/>
                <path d="M -20,-18 A 55,20 0 0,1 20,-18" fill="none" stroke="#2D2F7F" stroke-width="3"/>
                <path d="M 20,-18 A 55,20 0 0,1 55,0" fill="none" stroke="#6A6DFF" stroke-width="2"/>
                <path d="M 55,0 A 55,20 0 0,1 20,18" fill="none" stroke="#2D2F7F" stroke-width="2.5"/>
                <path d="M 20,18 A 55,20 0 0,1 -20,18" fill="none" stroke="#2D2F7F" stroke-width="2.5"/>
                <path d="M -20,18 A 55,20 0 0,1 -55,0" fill="none" stroke="#6A6DFF" stroke-width="2"/>
            </g>
            <g transform="rotate(-45)">
                <path d="M -55,0 A 55,20 0 0,1 -20,-18" fill="none" stroke="#1FA2A0" stroke-width="3"/>
                <path d="M -20,-18 A 55,20 0 0,1 20,-18" fill="none" stroke="#1FA2A0" stroke-width="3"/>
                <path d="M 20,-18 A 55,20 0 0,1 55,0" fill="none" stroke="#6A6DFF" stroke-width="2"/>
                <path d="M 55,0 A 55,20 0 0,1 20,18" fill="none" stroke="#1FA2A0" stroke-width="2.5"/>
                <path d="M 20,18 A 55,20 0 0,1 -20,18" fill="none" stroke="#1FA2A0" stroke-width="2.5"/>
                <path d="M -20,18 A 55,20 0 0,1 -55,0" fill="none" stroke="#6A6DFF" stroke-width="2"/>
            </g>
            <g>
                <path d="M -35,0 A 35,13 0 0,1 -12,-12" fill="none" stroke="#6A6DFF" stroke-width="3"/>
                <path d="M -12,-12 A 35,13 0 0,1 12,-12" fill="none" stroke="#6A6DFF" stroke-width="3"/>
                <path d="M 12,-12 A 35,13 0 0,1 35,0" fill="none" stroke="#1FA2A0" stroke-width="1.5"/>
                <path d="M 35,0 A 35,13 0 0,1 12,12" fill="none" stroke="#6A6DFF" stroke-width="2"/>
                <path d="M 12,12 A 35,13 0 0,1 -12,12" fill="none" stroke="#6A6DFF" stroke-width="2"/>
                <path d="M -12,12 A 35,13 0 0,1 -35,0" fill="none" stroke="#1FA2A0" stroke-width="1.5"/>
            </g>
            <circle cx="0" cy="0" r="6" fill="#1FA2A0"/>
            <circle cx="0" cy="0" r="3" fill="#E8F7F6"/>
        </g>
    </g>
    <text x="100" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#0F1A2B" letter-spacing="2">Celestryll</text>
</svg>
