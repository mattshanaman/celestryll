<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="rainbowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#0F1A2B;stop-opacity:1" />
            <stop offset="25%" style="stop-color:#2D2F7F;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#6A6DFF;stop-opacity:1" />
            <stop offset="75%" style="stop-color:#1FA2A0;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#E8F7F6;stop-opacity:1" />
        </linearGradient>
        <mask id="crescentMask">
            <circle cx="100" cy="80" r="42" fill="white"/>
            <circle cx="110" cy="80" r="35" fill="black"/>
        </mask>
    </defs>
    <!-- Crescent with rainbow gradient -->
    <circle cx="100" cy="80" r="42"
            fill="url(#rainbowGradient)"
            mask="url(#crescentMask)"/>
    <!-- Accent stars on left curve -->
    <circle cx="68" cy="54" r="3" fill="white" opacity="0.8"/>
    <circle cx="60" cy="80" r="3" fill="white" opacity="0.8"/>
    <circle cx="68" cy="106" r="3" fill="white" opacity="0.8"/>
    <text x="100" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#0F1A2B" letter-spacing="2">Celestryll</text>
</svg>
