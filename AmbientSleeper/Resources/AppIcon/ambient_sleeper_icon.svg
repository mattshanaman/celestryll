<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Ambient Sleeper icon">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080D19"/>
      <stop offset="55%" stop-color="#243A59"/>
      <stop offset="100%" stop-color="#3F4F6C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.68" cy="0.28" r="0.55">
      <stop offset="0%" stop-color="#93C5FD" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#93C5FD" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="moonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFF"/>
      <stop offset="100%" stop-color="#BFD5FF"/>
    </linearGradient>
  </defs>

  <!-- Rounded app-icon tile -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bgGrad)"/>
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#glow)"/>

  <!-- Crescent moon -->
  <circle cx="346" cy="168" r="70" fill="url(#moonGrad)"/>
  <circle cx="374" cy="148" r="66" fill="#1A2740"/>

  <!-- Stars -->
  <g fill="#DCEBFF">
    <circle cx="138" cy="132" r="6"/>
    <circle cx="184" cy="92" r="4"/>
    <circle cx="228" cy="140" r="5"/>
    <circle cx="420" cy="250" r="4"/>
  </g>

  <!-- Soft ambient waves -->
  <g fill="none" stroke="#D6E4FF" stroke-linecap="round" opacity="0.9">
    <path d="M112 312c30-22 60-22 90 0s60 22 90 0 60-22 90 0" stroke-width="18"/>
    <path d="M96 356c36-24 72-24 108 0s72 24 108 0 72-24 108 0" stroke-width="14" opacity="0.8"/>
    <path d="M82 398c42-24 84-24 126 0s84 24 126 0 84-24 126 0" stroke-width="10" opacity="0.7"/>
  </g>

  <!-- Inner border for crispness -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>
</svg>
