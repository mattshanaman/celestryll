<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Celestryll Mixed Palette</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f5;
            padding: 20px;
            color: #222;
        }

        h1 {
            margin-bottom: 0.5rem;
        }

        h2 {
            margin-top: 2rem;
        }

        .palette {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .swatch {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }

        .label {
            font-size: 0.85rem;
            color: #555;
            margin-top: 4px;
            text-align: center;
        }

        .swatch-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
    <h1>Celestryll – Mixed Palette (1 + 2)</h1>
    <p>Deep Indigo · Midnight Blue · Teal · Soft Violet · Light Aqua</p>

    <div class="palette">
        <div class="swatch-block">
            <div class="swatch" style="background:#2D2F7F;"></div>
            <div class="label">#2D2F7F<br>Deep Indigo</div>
        </div>

        <div class="swatch-block">
            <div class="swatch" style="background:#0F1A2B;"></div>
            <div class="label">#0F1A2B<br>Midnight Blue</div>
        </div>

        <div class="swatch-block">
            <div class="swatch" style="background:#1FA2A0;"></div>
            <div class="label">#1FA2A0<br>Teal</div>
        </div>

        <div class="swatch-block">
            <div class="swatch" style="background:#6A6DFF;"></div>
            <div class="label">#6A6DFF<br>Soft Violet</div>
        </div>

        <div class="swatch-block">
            <div class="swatch" style="background:#E8F7F6;"></div>
            <div class="label">#E8F7F6<br>Light Aqua</div>
        </div>
    </div>
</body>
</html>
